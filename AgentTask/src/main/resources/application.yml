# Spring Boot 3：显式 import bootstrap.yml，确保 datasource/redis/cosmos 等在 Bean 创建前进入 Environment
#（否则 MybatisPlusConfig 中 @Value("${datasource.url}") 可能解析失败）。
server:
  port: ${PORT:8080}

spring:
  config:
    import:
      - classpath:bootstrap.yml

# Redis List 队列（Spark LPUSH → AgentTask BRPOP）
translate:
  v3:
    queue:
      enabled: true
      brpop-timeout-seconds: 30
