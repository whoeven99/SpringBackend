# Spring Cloud Azure Key Vault
spring:
  application:
    name: bogda-web

  cloud:
    azure:
      profile:
        tenant-id: ${appRegistration.tenant-id}

      credential:
        client-id: ${appRegistration.client-id}
        client-secret: ${Azure_Client_Secret}   # 本地 IDE / Render：配置环境变量 Azure_Client_Secret，勿提交明文

      keyvault:
        secret:
          property-source-enabled: true
          property-sources:
            - name: springbackend-keyvault
              endpoint: ${keyvault.endpoint}

appRegistration:
  client-id: baa53d85-60af-4746-8976-ff329ef7dafc
  tenant-id: 7e4cb437-91a6-4a28-88e5-6549623374c5

keyvault:
  endpoint: https://springbackendvault.vault.azure.net/

# Azure SQL：若出现 SSL Connection reset，优先在门户把本机公网 IP 加入服务器防火墙；必要时设 JVM：-Djdk.tls.client.protocols=TLSv1.2
# 可用环境变量 DATASOURCE_URL 覆盖整条 JDBC（不改文件）；可选 datasource.connection-properties（或 DATASOURCE_CONNECTION_PROPERTIES）追加驱动属性
datasource:
  url: ${DATASOURCE_URL:jdbc:sqlserver://bogdatechtestsqlserver.database.windows.net:1433;database=bogdatech-test;encrypt=true;trustServerCertificate=true;hostNameInCertificate=*.database.windows.net;loginTimeout=30;}
  username: bogdatechtestsqlserver@bogdatechtestsqlserver
  password: Hyw124563
  connection-properties: ${DATASOURCE_CONNECTION_PROPERTIES:}

redis:
  hostname: azure-cache-dev.redis.cache.windows.net

blob:
  translate-v3:
    connection-string: DefaultEndpointsProtocol=https;AccountName=transblobstoragetest;AccountKey=t6bQvkNPSv58uy/ng6o0thriGXB0V8ShMM5zAFo6eIRCpqfaJVghkmUbUUhBzbmdZXsmtPOqZHlZ+AStmR+L/A==;EndpointSuffix=core.windows.net
    container: translate-v3

