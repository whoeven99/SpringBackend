<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>模块质量报告详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">模块质量报告详情</h4>
        <a class="btn btn-outline-secondary btn-sm"
           th:href="@{/admin/v3/task(id=${task != null ? task.id : ''},shopName=${task != null ? task.shopName : ''},status=${selectedStatus})}">
            返回任务详情
        </a>
    </div>

    <div th:if="${task == null}" class="alert alert-warning">
        未找到任务，请确认参数是否正确。
    </div>

    <div th:if="${task != null}">
        <div class="card mb-3">
            <div class="card-header">基本信息</div>
            <div class="card-body small">
                <div><strong>Task ID:</strong> <span th:text="${task.id}"></span></div>
                <div><strong>Shop:</strong> <span th:text="${task.shopName}"></span></div>
                <div><strong>Module:</strong> <span th:text="${module}"></span></div>
                <div><strong>BlobPath:</strong> <span class="text-break" th:text="${moduleBlobPath}"></span></div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header">评分摘要</div>
            <div class="card-body">
                <div th:if="${moduleAiReport == null}" class="text-muted small">未找到该模块质量报告文件。</div>
                <div th:if="${moduleAiReport != null}" class="row g-2 small">
                    <div class="col-md-4"><strong>Status:</strong> <span th:text="${moduleResult['status']}"></span></div>
                    <div class="col-md-4"><strong>Score:</strong> <span th:text="${moduleResult['score']}"></span></div>
                    <div class="col-md-4"><strong>SampleCount:</strong> <span th:text="${moduleResult['sampleCount']}"></span></div>
                    <div class="col-md-4"><strong>TokenUsed:</strong> <span th:text="${moduleResult['tokenUsed'] != null ? moduleResult['tokenUsed'] : '-'}"></span></div>
                    <div class="col-md-8"><strong>Summary:</strong> <span th:text="${moduleResult['summary']}"></span></div>
                </div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header">评分维度</div>
            <div class="card-body p-0">
                <table class="table table-sm mb-0">
                    <thead class="table-light">
                    <tr>
                        <th style="width: 35%">Dimension</th>
                        <th>Score</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#maps.isEmpty(moduleDimensions)}">
                        <td colspan="2" class="text-muted text-center py-2">无维度评分数据</td>
                    </tr>
                    <tr th:each="entry : ${moduleDimensions}">
                        <td class="small" th:text="${entry.key}">accuracy</td>
                        <td class="small" th:text="${entry.value}">95</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header">问题列表</div>
            <div class="card-body">
                <ul class="mb-0 small">
                    <li th:if="${#lists.isEmpty(moduleIssues)}" class="text-muted">无问题列表</li>
                    <li th:each="issue : ${moduleIssues}" th:text="${issue}">issue</li>
                </ul>
            </div>
        </div>

        <div class="card">
            <div class="card-header">原始 JSON</div>
            <div class="card-body">
                <pre class="small mb-0 text-break" th:text="${moduleRawJson != null ? moduleRawJson : '无原始JSON'}"></pre>
            </div>
        </div>
    </div>
</div>
</body>
</html>
