<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Translate V3 任务列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Translate V3 任务列表</h4>
        <a class="btn btn-outline-primary btn-sm" href="/admin/v3/tasks">刷新</a>
    </div>

    <form method="get" action="/admin/v3/tasks" class="row g-2 mb-3">
        <div class="col-auto">
            <label for="status" class="form-label">按状态筛选</label>
            <select id="status" name="status" class="form-select form-select-sm">
                <option value="">全部</option>
                <option th:each="entry : ${statusOptions}"
                        th:value="${entry.key}"
                        th:selected="${selectedStatus != null and selectedStatus == entry.key}"
                        th:text="${entry.value}"></option>
            </select>
        </div>
        <div class="col-auto align-self-end">
            <button type="submit" class="btn btn-primary btn-sm">查询</button>
        </div>
        <div class="col-auto align-self-end text-muted small">
            总数：<span th:text="${total}">0</span>
        </div>
    </form>

    <div class="table-responsive bg-white border rounded">
        <table class="table table-sm table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th>Task ID</th>
                <th>Shop</th>
                <th>Source</th>
                <th>Target</th>
                <th>Status</th>
                <th>AI Model</th>
                <th>Updated At</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="7" class="text-center text-muted py-3">暂无任务</td>
            </tr>
            <tr th:each="task : ${tasks}">
                <td class="small">
                    <a th:href="@{/admin/v3/task(id=${task.id},shopName=${task.shopName},status=${selectedStatus})}"
                       th:text="${task.id}">id</a>
                </td>
                <td class="small" th:text="${task.shopName}">shop</td>
                <td th:text="${task.source}">en</td>
                <td th:text="${task.target}">fr</td>
                <td th:text="${task.status}">1</td>
                <td class="small" th:text="${task.aiModel}">model</td>
                <td class="small" th:text="${task.updatedAt}">time</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
