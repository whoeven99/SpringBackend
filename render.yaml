# Render Blueprint（可选）：Dashboard → New → Blueprint 粘贴本仓库连接时使用。
# 部署前请在 Render 控制台补全 Secret：COSMOS_KEY、REDIS_CACHEKEY_VAULT、BLOB_TRANSLATE_V3_CONNECTION_STRING 等。
#
# 说明：https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: agent-task
    runtime: docker
    dockerfilePath: ./Dockerfile.agent-task
    dockerContext: .
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      # Spring Boot relaxed binding：下列名称对应 application.properties 中的属性
      - key: COSMOS_ENDPOINT
        sync: false
      - key: COSMOS_KEY
        sync: false
      - key: COSMOS_DATABASE
        sync: false
      - key: COSMOS_CONTAINER
        sync: false
      - key: REDIS_HOSTNAME
        sync: false
      - key: REDIS_CACHEKEY_VAULT
        sync: false
      - key: BLOB_TRANSLATE_V3_CONNECTION_STRING
        sync: false
